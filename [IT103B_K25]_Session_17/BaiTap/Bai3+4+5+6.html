<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 3</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html {
            display: flex;
            flex-direction: column;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* background-color: #faf5e6; */
            padding: 0 20px;
        }

        header {
            padding: 30px 10px;
            text-align: center;
            background-color: red;
            margin-top: 20px;
            width: 100%;
            color: white;
            line-height: 35px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            transition: all 0.25s linear;
        }

        header:hover {
            transform: rotate(360deg) translateY(200px) scale(1.3);
            background: linear-gradient(305deg, rgba(97, 92, 124, 255) 12%, rgba(37, 10, 46, 255) 36%, rgba(104, 121, 158, 255) 54%, rgba(67, 107, 75, 255) 77%, rgba(114, 154, 118, 1) 93%);
        }

        .toDoList {
            background-color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 10px;
        }

        .contener {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            background-color: #fff8e2;
            border-radius: 10px;
            border-left: 6px solid salmon;
            transition: all 0.25s linear;
        }

        .contener span {
            opacity: 0.5;
            font-style: italic;
        }

        .contener:hover {
            transform: translateX(10px);
        }

        .badage img {
            width: 30px;
            height: 30px;
        }

        .badage {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .have:checked + h3{
            text-decoration: line-through;
        }

        .Checked {
            background-color: #e8f5ea;
            border-left: 5px solid #045d12;
            filter: brightness(0.95);
            /* animation: spin 0.2s linear infinite; */
        }
        .btn{
            outline: none;
            border: none;
            background-color: #fff8e2;
            width: 50px;
            height: 30px;
            cursor: pointer;
            transition: all 0.2s linear;
        }
        .btn:hover{
            background-color: rebeccapurple;
            border-radius: 4px;
            transform: scale(1.2);
        }
        /* @keyframes spin{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        } */
        .form--contener {
            padding: 20px 30px;
            background-color: #fffee7;
            display: flex;
            gap: 20px;
        }

        .input-group {
            position: relative;
            flex: 4;
        }

        .input-group input {
            width: 100%;
            height: 40px;
            padding: 10px;
        }

        .input-group label {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            pointer-events: none;
            transition: all 0.25s linear;
            background: white;
            padding: 0 4px;
        }

        .input-group input:focus+label{
            top: -8px;
            font-size: 12px;
            color: #d1ab50;
        }
        
        /* .form--contener input:focus::placeholder{
            transform: translateY(10px);
        } */
        /* @keyframes up {
            from {
                transform: translateY(0px);
            }

            to {
                transform: translateY(-10px);
            }
        } */

        .form--contener button {
            flex: 1;
            border: none;
            background-color: #d1ab50;
            transition: all 0.15s linear;
        }
        .form--contener button:hover{
            background-color: rgb(76, 41, 113);
            border: 2px solid rgb(51, 125, 148);
            box-shadow: 1px 1px 1px 1px rgb(66, 107, 86);
            color: white;
            transform: translateY(-5px) scale(calc(1.1));
        }
        .btn--checked{
            text-decoration: line-through;
        }
        footer {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            background-color: white;
            padding: 20px 0px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Công việc chuẩn bị Tết</h1>
        <p>Thêm công việc mới & đánh dấu hoàn thành</p>
    </header>
    <main>
        <div class="form--contener">
            <div class="input-group">
                <input type="text" id="input--task" required>
                <label for="input--task">Nhập công việc mới...</label>
            </div>
            <button class="btn--add">Thêm</button>
            <button class="btn--deleteAll">Xóa tất cả</button>
        </div>
        <div class="toDoList">

        </div>
    </main>
    <footer>
        <hr>
        <p>Mọi thay đổi (thêm / đánh dấu) được lưu tự động vào localStorage . Refersh để kiểm tra</p>
    </footer>
    <script>
        const initialTodos = [
            { id: 1, task: "Mua bánh chưng", done: false },
            { id: 2, task: "Dọn nhà đón tết", done: false },
            { id: 3, task: "Gói bánh chưng", done: false },
            { id: 4, task: "Trang trí nhà cửa bàng hoa mai, hoa đào", done: false },
            { id: 5, task: "Mua phong bao lì xì", done: false },
            { id: 6, task: "Chuẩn bị mâm ngũ quả", done: false },
        ];
        let listItem = document.querySelector(".toDoList");

        if (!localStorage.getItem("initialTodos")) {
            localStorage.setItem("initialTodos", JSON.stringify(initialTodos));
        }
        let todos = JSON.parse(localStorage.getItem("initialTodos")) || initialTodos;

        let renderAllTask = () => {
            let line = "";
            todos.forEach(c => {
                line += `
             <div class="contener ${c.done ? "Checked" : ""}">
                <div class="badage">
                    <input type = "checkbox" ${c.done ? "checked" : ""}  class = "have" data-id = "${c.id}"/>
                    <h3>${c.task}</h3>
                </div>
                <div class = "btn-decor" >
                    <button class = "btn btn--edit ${c.done ? "btn--checked" : ""}"  data-id = "${c.id}">✏️</button>
                    <button class = "btn btn--delete ${c.done ? "btn--checked" : ""}" data-id = "${c.id}">🗑️</button>
                </div>
            </div>
        `;
            });
            listItem.innerHTML = line;
            document.querySelectorAll(".have").forEach(cb => {
                cb.addEventListener("change", (e) => {
                    let id = +e.target.dataset.id;

                    let task = todos.find(t => t.id === id);
                    task.done = e.target.checked;

                    localStorage.setItem("initialTodos", JSON.stringify(todos));
                    renderAllTask();
                });
            });
        }
        renderAllTask();
        document.querySelector(".btn--add").addEventListener("click", (e) => {
            e.preventDefault();
            let inputItem = document.getElementById("input--task");
            if(inputItem.value.trim() === ""){
                alert("Công việc không được để trống !");
            }else{
                const newTask = {
                    id: todos.length ? todos[todos.length -1].id + 1 : 1,
                    task: inputItem.value,
                    done: false,
                }
                todos.push(newTask);
                localStorage.setItem("initialTodos", JSON.stringify(todos));
                inputItem.value = "";
                renderAllTask();
            }
        });
    </script>
</body>

</html>
