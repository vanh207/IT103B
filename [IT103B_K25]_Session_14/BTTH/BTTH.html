<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chợ Tết Online 2026</title>
    <!-- Nhúng CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🧧 CHỢ TẾT ONLINE 🧧</h1>
        <p>Sắm sửa đón xuân - Rinh lộc về nhà</p>
    </header>

    <div class="container">
        <!-- Cột trái: Danh sách sản phẩm -->
        <div class="left-col">
            <h2>Gian Hàng Tết</h2>
            <div id="product-list" class="grid-container">
                <!-- Javascript sẽ render sản phẩm vào đây -->
            </div>
        </div>

        <!-- Cột phải: Giỏ hàng -->
        <div class="right-col">
            <div class="cart-box">
                <h2 >🛒 Giỏ Hàng Của Bạn</h2>
                <!-- Danh sách các món đã mua -->
                <ul id="cart-list">
                    
                    
                </ul>

                <div class="cart-summary">
                    
                </div>
            </div>
        </div>
    </div>

    <!-- Nhúng Javascript -->
    <script src="./BTTH.js"></script>
</body>

</html>
