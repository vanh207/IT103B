<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 2</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html {
            display: flex;
            flex-direction: column;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #faf5e6;
            padding: 0 20px;
        }

        header {
            padding: 30px 10px;
            text-align: center;
            background-color: red;
            margin-top: 20px;
            width: 100%;
            color: white;
            line-height: 35px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            transition: all 0.25s linear;
        }

        header:hover {
            transform: rotate(360deg) translateY(200px) scale(1.3);
            background: linear-gradient(305deg, rgba(97, 92, 124, 255) 12%, rgba(37, 10, 46, 255) 36%, rgba(104, 121, 158, 255) 54%, rgba(67, 107, 75, 255) 77%, rgba(114, 154, 118, 1) 93%);
        }

        .toDoList {
            background-color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 10px;
        }

        .contener {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            background-color: #fff8e2;
            border-radius: 10px;
            border-left: 6px solid salmon;
            transition: all 0.25s linear;
        }

        .contener span {
            opacity: 0.5;
            font-style: italic;
        }

        .contener:hover {
            transform: translateX(10px);
        }

        .badage img {
            width: 30px;
            height: 30px;
        }

        .badage {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .have:checked+h3 {
            text-decoration: line-through;
        }

        .Checked {
            background-color: #e8f5ea;
            border-left: 5px solid #045d12;
            filter: brightness(0.95);
            /* animation: spin 0.2s linear infinite; */
        }
        /* @keyframes spin{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        } */
        footer {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
            background-color: white;
            padding: 20px 0px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Công việc chuẩn bị Tết</h1>
        <p>Click để đánh dấu hoàn thành</p>
    </header>
    <main>
        <div class="toDoList">

        </div>
    </main>
    <footer>
        <hr>
        <p>Trạng thái tự động lưu vào localStorage . Refresh để kiểm tra xem</p>
    </footer>
    <script>
        const initialTodos = [
            { id: 1, task: "Mua bánh chưng", done: false },
            { id: 2, task: "Dọn nhà đón tết", done: false },
            { id: 3, task: "Gói bánh chưng", done: false },
            { id: 4, task: "Trang trí nhà cửa bàng hoa mai, hoa đào", done: false },
            { id: 5, task: "Mua phong bao lì xì", done: false },
            { id: 6, task: "Chuẩn bị mâm ngũ quả", done: false },
        ];
        let listItem = document.querySelector(".toDoList");

        if (!localStorage.getItem("initialTodos")) {
            localStorage.setItem("initialTodos", JSON.stringify(initialTodos));
        }
        let todos = JSON.parse(localStorage.getItem("initialTodos")) || initialTodos;

        let renderAllTask = () => {
            let line = "";
            todos.forEach(c => {
                line += `
             <div class="contener ${c.done ? "Checked" : ""}">
                <div class="badage">
                    <input type = "checkbox" ${c.done ? "checked" : ""}  class = "have" data-id = "${c.id}"/>
                    <h3>${c.task}</h3>
                </div>
            </div>
        `;
            });
            listItem.innerHTML = line;
            document.querySelectorAll(".have").forEach(cb => {
                cb.addEventListener("change", (e) => {
                    let id = +e.target.dataset.id;

                    let task = todos.find(t => t.id === id);
                    task.done = e.target.checked;

                    localStorage.setItem("initialTodos", JSON.stringify(todos));
                    renderAllTask();
                });
            });
        }
        renderAllTask();
       
    </script>
</body>

</html>
