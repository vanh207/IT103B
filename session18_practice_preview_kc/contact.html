<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý danh bạ</title>
    <link rel="stylesheet" href="./contact.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <h1>Quản lý danh bạ</h1>
      </header>

      <!-- Form thêm danh bạ -->
      <section class="form-section">
        <form id="contact-form" class="contact-form">
          <div class="form-group">
            <label for="contact-name">Họ tên:</label>
            <input
              type="text"
              id="contact-name"
              name="name"
              placeholder="Nhập họ tên"
              required
            />
          </div>

          <div class="form-group">
            <label for="contact-phone">Số điện thoại:</label>
            <input
              type="tel"
              id="contact-phone"
              name="phone"
              placeholder="Nhập số điện thoại"
              required
            />
          </div>

          <div class="form-group">
            <label for="contact-email">Email:</label>
            <input
              type="email"
              id="contact-email"
              name="email"
              placeholder="Nhập email"
              required
            />
          </div>

          <button type="submit" class="btn-add">Thêm</button>
        </form>
      </section>

      <!-- Bảng danh sách danh bạ -->
      <section class="table-section">
        <div class="table-wrapper">
          <table class="contact-table">
            <thead>
              <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Số điện thoại</th>
                <th>Email</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="contact-tbody">
              <tr></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <script src="./contact.js"></script>
  </body>
</html>
